<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JS Concepts — 30 Chapter Interactive Course</title>
<style>
:root{
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
  --r-lg:10px;--r-md:7px;
  --bg:#FAFAF9;--bg2:#F3F2F0;--bg3:#FFFFFF;
  --bd:#E5E4E1;--bd2:#D0CFC9;
  --tx:#1A1A18;--tx2:#4A4A46;--tx3:#8A8A84;
  --purple:#7F77DD;--purple-bg:#EEEDFE;--purple-dk:#3C3489;
  --green:#1D9E75;--green-bg:#E1F5EE;--green-dk:#085041;
  --orange:#EF9F27;--orange-bg:#FAEEDA;--orange-dk:#633806;
  --red:#D85A30;--red-bg:#FAECE7;--red-dk:#712B13;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-bd:#BFDBFE;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1C1C1A;--bg2:#242422;--bg3:#2C2C2A;
  --bd:#3A3A36;--bd2:#4A4A46;
  --tx:#E8E8E4;--tx2:#B0B0AA;--tx3:#707068;
  --purple-bg:#26215C;--purple-dk:#CECBF6;
  --green-bg:#04342C;--green-dk:#9FE1CB;
  --orange-bg:#412402;--orange-dk:#FAC775;
  --red-bg:#4A1B0C;--red-dk:#F5C4B3;
  --blue:#85C1E9;--blue-bg:#0D2137;--blue-bd:#2E86C1;
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);font-size:13px;color:var(--tx);background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOP NAV */
.topnav{display:flex;align-items:center;gap:0;background:var(--bg2);border-bottom:0.5px solid var(--bd);flex-shrink:0;padding:0 16px;height:44px}
.app-title{font-size:14px;font-weight:600;color:var(--tx);margin-right:16px;white-space:nowrap}
.ch-tabs{display:flex;gap:2px;overflow-x:auto;flex:1;padding:6px 0;scrollbar-width:none}
.ch-tabs::-webkit-scrollbar{display:none}
.ch-tab{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--tx3);transition:all .13s;border:0.5px solid transparent;flex-shrink:0}
.ch-tab:hover{background:var(--bg3);color:var(--tx)}
.ch-tab.active{background:var(--purple-bg);color:var(--purple-dk);border-color:var(--purple)}
.ch-tab.done{color:var(--tx2)}
.progress-pill{font-size:11px;color:var(--tx3);white-space:nowrap;margin-left:8px;flex-shrink:0}

/* MAIN SPLIT */
.content{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;flex-shrink:0;background:var(--bg2);border-right:0.5px solid var(--bd);overflow-y:auto;padding:8px 0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.sideitem{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .12s}
.sideitem:hover{background:var(--bg3)}
.sideitem.active{background:var(--bg3);border-left-color:var(--purple)}
.si-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0;background:var(--bd);color:var(--tx2)}
.sideitem.done .si-num{background:var(--green);color:#fff}
.sideitem.active .si-num{background:var(--purple);color:#fff}
.si-info{flex:1;min-width:0}
.si-title{font-size:11px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-tag{font-size:9.5px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main-header{padding:12px 18px;border-bottom:0.5px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ch-badge{padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500;background:var(--purple-bg);color:var(--purple-dk);flex-shrink:0}
.main-title{font-size:14px;font-weight:500}
.main-body{flex:1;overflow-y:auto;padding:16px 18px}
.main-body::-webkit-scrollbar{width:5px}
.main-body::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

.concept-box{background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--r-lg);padding:12px 14px;margin-bottom:14px}
.concept-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:4px}
.concept-text{font-size:12.5px;line-height:1.75;color:var(--tx2)}
.concept-text strong{font-weight:500;color:var(--tx)}
.concept-text code{font-family:var(--mono);font-size:11px;background:var(--bd);padding:1px 4px;border-radius:3px}
.concept-text em{font-style:italic}

.callout{border-radius:var(--r-md);padding:9px 12px;margin-bottom:13px;font-size:12px;line-height:1.6}
.callout-purple{background:var(--purple-bg);color:var(--purple-dk);border:0.5px solid #AFA9EC}
.callout-green{background:var(--green-bg);color:var(--green-dk);border:0.5px solid #5DCAA5}
.callout-orange{background:var(--orange-bg);color:var(--orange-dk);border:0.5px solid var(--orange)}

.ref-row{display:flex;gap:7px;margin-bottom:13px;flex-wrap:wrap}
.ref-card{flex:1;min-width:110px;padding:7px 9px;border-radius:var(--r-md);border:0.5px solid var(--bd);background:var(--bg2)}
.ref-lbl{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.ref-title{font-size:12px;font-weight:500;color:var(--tx)}
.ref-sub{font-size:10.5px;color:var(--tx3);margin-top:1px;line-height:1.4;font-family:var(--mono)}

.ex-nav{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.ex-arrow{width:24px;height:24px;border-radius:50%;border:0.5px solid var(--bd2);background:transparent;color:var(--tx3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .13s;flex-shrink:0}
.ex-arrow:hover:not(:disabled){background:var(--bg2);color:var(--tx)}
.ex-arrow:disabled{opacity:.25;cursor:not-allowed}
.ex-name{font-size:13px;font-weight:500}
.ex-counter{font-size:11px;color:var(--tx3);margin-left:5px}
.ex-desc{font-size:12px;color:var(--tx2);line-height:1.65;margin-bottom:11px}
.ex-desc code{font-family:var(--mono);font-size:11px;background:var(--bd);padding:1px 4px;border-radius:3px}
.ex-desc em{font-style:italic}

.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

.step-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg2);border-radius:var(--r-md);border:0.5px solid var(--bd);margin-bottom:7px}
.sdots{display:flex;gap:4px;flex:1;flex-wrap:wrap}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--bd2);transition:background .2s;flex-shrink:0}
.sdot.done{background:var(--purple)}.sdot.cur{background:var(--orange)}
.sctr{font-size:11px;font-weight:500;color:var(--tx3);white-space:nowrap}
.sdesc{font-size:11px;color:var(--tx2);text-align:right;min-width:100px}

.nav-row{display:flex;gap:6px;align-items:center;margin-bottom:11px}
.sp{flex:1}
.btn{padding:6px 14px;border-radius:var(--r-md);border:0.5px solid var(--bd2);background:transparent;color:var(--tx);font-size:12px;cursor:pointer;transition:all .13s;font-family:var(--sans)}
.btn:hover:not(:disabled){background:var(--bg2)}
.btn:active:not(:disabled){transform:scale(.98)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-p{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.btn-p:hover:not(:disabled){opacity:.85}

.grid4{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:520px){.grid4{grid-template-columns:1fr}}
.panel{background:var(--bg3);border:0.5px solid var(--bd);border-radius:var(--r-lg);padding:10px 12px;min-height:120px}
.ptitle{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.code-block{background:var(--bg2);border:0.5px solid var(--bd);border-radius:var(--r-md);padding:7px 9px;font-family:var(--mono);font-size:10.5px;line-height:1.7;white-space:pre;overflow-x:auto}
.kw{color:#8B5CF6;font-weight:500}.fn{color:#185FA5}.str{color:#059669}.cm{color:var(--tx3);font-style:italic}
.hl{background:var(--orange-bg);border-radius:2px;transition:background .2s}

.cstack{display:flex;flex-direction:column-reverse;gap:3px;min-height:80px}
.frame{padding:4px 8px;border-radius:var(--r-md);font-family:var(--mono);font-size:11px;font-weight:500;border:0.5px solid transparent;transition:all .22s;opacity:0;transform:translateY(4px)}
.frame.show{opacity:1;transform:translateY(0)}
.f-global{background:#F1EFE8;color:#444441;border-color:#B4B2A9}
.f-hof{background:var(--purple-bg);color:var(--purple-dk);border-color:#AFA9EC}
.f-cb{background:var(--green-bg);color:var(--green-dk);border-color:#5DCAA5}
.f-active{background:var(--orange-bg);color:var(--orange-dk);border-color:var(--orange)}
.f-special{background:var(--red-bg);color:var(--red-dk);border-color:#F0997B}
@media(prefers-color-scheme:dark){.f-global{background:#2C2C2A;color:#D3D1C7;border-color:#5F5E5A}}

.dflow{display:flex;flex-direction:column;gap:3px;min-height:80px;max-height:180px;overflow-y:auto}
.ditem{display:flex;align-items:flex-start;gap:5px;padding:3px 6px;border-radius:var(--r-md);font-family:var(--mono);font-size:10px;opacity:0;transform:translateX(-4px);transition:all .2s;line-height:1.5}
.ditem.show{opacity:1;transform:translateX(0)}
.dicon{flex-shrink:0;width:12px;height:12px;border-radius:2px;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:500}
.dtxt{flex:1;word-break:break-word}
.d-input{background:var(--bg2);color:var(--tx)}
.d-input .dicon{background:var(--bd2);color:var(--tx3)}
.d-transform{background:var(--green-bg);color:var(--green-dk)}
.d-transform .dicon{background:#5DCAA5;color:#04342C}
.d-output{background:var(--purple-bg);color:var(--purple-dk)}
.d-output .dicon{background:#AFA9EC;color:#26215C}
.d-special{background:var(--red-bg);color:var(--red-dk)}
.d-special .dicon{background:var(--red);color:#fff}
.log-item{background:var(--bg2);color:var(--tx)}
.log-purple{border-left:2px solid var(--purple)}.log-purple .dicon{background:var(--purple);color:#fff}
.log-green{border-left:2px solid var(--green)}.log-green .dicon{background:var(--green);color:#fff}
.log-orange{border-left:2px solid #BA7517}.log-orange .dicon{background:#BA7517;color:#fff}
.log-red{border-left:2px solid var(--red)}.log-red .dicon{background:var(--red);color:#fff}
.df-div{height:.5px;background:var(--bd);margin:3px 0}
.df-lbl{font-size:9px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.04em;padding:1px 0 2px}

.memsec{margin-bottom:6px}
.memtitle{font-size:9px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px;padding:1px 5px;border-radius:3px;display:inline-block}
.mt-global{background:var(--red-bg);color:var(--red-dk)}
.mt-local{background:var(--green-bg);color:var(--green-dk)}
.mt-closure{background:var(--purple-bg);color:var(--purple-dk)}
@media(prefers-color-scheme:dark){
  .mt-global{background:#4A1B0C;color:#F5C4B3}
  .mt-local{background:#04342C;color:#9FE1CB}
  .mt-closure{background:#26215C;color:#CECBF6}
}
.memrows{display:flex;flex-direction:column;gap:2px}
.memrow{display:flex;align-items:center;font-family:var(--mono);font-size:10px;border-radius:3px;overflow:hidden;opacity:0;transition:all .2s;transform:translateX(-3px)}
.memrow.show{opacity:1;transform:translateX(0)}
.memkey{padding:2px 5px;background:var(--bg2);color:var(--tx2);border-right:.5px solid var(--bd);min-width:60px;font-weight:500;flex-shrink:0;font-size:10px}
.memval{padding:2px 6px;color:var(--tx);background:var(--bg3);flex:1;font-size:10px}
.mv-new{color:var(--purple-dk);font-weight:500}
.mv-changed{color:var(--green-dk);font-weight:500}
.mv-special{color:var(--red-dk);font-weight:500}
@media(prefers-color-scheme:dark){.mv-new{color:#AFA9EC}.mv-changed{color:#5DCAA5}.mv-special{color:#F5C4B3}}
.mem-empty{font-size:10px;color:var(--tx3);font-style:italic;padding:2px 0}

/* Mobile sidebar toggle */
@media(max-width:700px){.sidebar{display:none}.sidebar.open{display:block;position:fixed;left:0;top:44px;bottom:0;z-index:100;box-shadow:2px 0 12px rgba(0,0,0,.15)}}
.menu-btn{display:none;background:transparent;border:none;cursor:pointer;font-size:18px;color:var(--tx);padding:0 8px}
@media(max-width:700px){.menu-btn{display:block}}
</style>
</head>
<body>
<div class="topnav">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <span class="app-title">JS Concepts</span>
  <div class="ch-tabs" id="ch-tabs"></div>
  <span class="progress-pill" id="prog-pill">30 chapters</span>
</div>
<div class="content">
  <div class="sidebar" id="sidebar">
    <div id="side-list"></div>
  </div>
  <div class="main">
    <div class="main-header">
      <span class="ch-badge" id="hdr-badge">Ch. 1</span>
      <span class="main-title" id="hdr-title"></span>
    </div>
    <div class="main-body" id="main-body">
      <div class="concept-box"><div class="concept-label">Concept</div><div class="concept-text" id="concept-text"></div></div>
      <div id="callout-area"></div>
      <div id="ref-area"></div>
      <div class="ex-nav">
        <button class="ex-arrow" id="ex-prev" onclick="switchEx(-1)" disabled>&#8592;</button>
        <div style="flex:1"><span class="ex-name" id="ex-name"></span><span class="ex-counter" id="ex-ctr"></span></div>
        <button class="ex-arrow" id="ex-next" onclick="switchEx(1)">&#8594;</button>
      </div>
      <div class="ex-desc" id="ex-desc"></div>
      <div class="legend" id="legend"></div>
      <div class="step-bar">
        <div class="sdots" id="sdots"></div>
        <span class="sctr" id="sctr">0/0</span>
        <span class="sdesc" id="sdesc">Press Next</span>
      </div>
      <div class="nav-row">
        <button class="btn" id="btn-prev" onclick="nav(-1)" disabled>← Prev</button>
        <button class="btn btn-p" id="btn-next" onclick="nav(1)">Next →</button>
        <div class="sp"></div>
        <button class="btn" id="btn-auto" onclick="autoPlay()">Auto-play</button>
      </div>
      <div class="grid4">
        <div class="panel"><div class="ptitle"><div class="pdot" style="background:var(--purple)"></div>Code</div><div class="code-block" id="card-code" style="min-height:80px"></div></div>
        <div class="panel"><div class="ptitle"><div class="pdot" style="background:var(--green)"></div>Call stack</div><div class="cstack" id="card-stack"></div></div>
        <div class="panel"><div class="ptitle"><div class="pdot" style="background:#BA7517"></div>Data flow &amp; console</div><div class="dflow" id="card-flow"></div></div>
        <div class="panel"><div class="ptitle"><div class="pdot" style="background:var(--red)"></div><span id="mem-panel-title">Memory</span></div><div id="card-mem"></div></div>
      </div>
    </div>
  </div>
</div>
<script>
const CHAPTERS = [
{num:1,title:"Execution context",tag:"global · local · thread of execution",
concept:"Every time JavaScript runs code it creates an <strong>execution context</strong> — a wrapper containing the code being run and the memory space for its variables. There are two kinds: the <strong>Global Execution Context (GEC)</strong> created automatically when a script starts, and a <strong>Local Execution Context</strong> created fresh every time a function is <em>called</em>. Each context has two phases: a memory phase (variables hoisted, set to <code>undefined</code>) and an execution phase (code runs line by line). The <strong>thread of execution</strong> is JS's single worker — it can only do one thing at a time.",
callout:null,
refs:[
  {lbl:"GEC",cls:"",title:"Global context",sub:"created on script start"},
  {lbl:"Local",cls:"",title:"Per function call",sub:"created on each call"},
  {lbl:"Thread",cls:"",title:"Single-threaded",sub:"one thing at a time"},
],
memPanelTitle:"Variable environment",
legend:[
  {color:"var(--purple)",label:"Global scope"},
  {color:"var(--green)",label:"Local scope"},
  {color:"var(--orange)",label:"Currently executing"},
],
examples:[{
  name:"Global vs local execution context",
  desc:"The GEC holds globally-scoped variables. Each function call creates its own local context with its own variable environment. When the function returns, its context is destroyed.",
  code:`<span class="kw">const</span> <span id="gc0">num</span> = 3;

<span class="kw">function</span> <span id="gc1">multiplyBy2</span>(inputNumber) {
  <span class="kw">const</span> <span id="gc2">result</span> = inputNumber * 2;
  <span class="kw">return</span> result;
}

<span class="kw">const</span> <span id="gc3">output</span> = multiplyBy2(num);
<span class="kw">const</span> <span id="gc4">newOutput</span> = multiplyBy2(10);`,
  steps:["GEC created — num=3 stored","multiplyBy2 defined in GEC","multiplyBy2(3) called — new local context","result = 3*2 = 6 in local memory","return 6 — local context destroyed","output=6, then newOutput=20"],
  hl:["gc0","gc1","gc3","gc2","gc2","gc4"],
  frames:[
    [{l:"global()",t:"f-global"}],
    [{l:"global()",t:"f-global"}],
    [{l:"global()",t:"f-global"},{l:"multiplyBy2(3)",t:"f-hof"}],
    [{l:"global()",t:"f-global"},{l:"multiplyBy2(3)",t:"f-active"}],
    [{l:"global()",t:"f-global"},{l:"multiplyBy2(3)",t:"f-cb"}],
    [{l:"global()",t:"f-global"}],
  ],
  flow:[
    [{t:"d-input",i:"→",v:"num = 3"},{t:"log-purple",i:"H",v:"GEC: num stored globally"}],
    [{t:"d-input",i:"→",v:"multiplyBy2 = fn ref"},{t:"log-purple",i:"H",v:"GEC: function stored"}],
    [{t:"d-input",i:"→",v:"multiplyBy2(3)"},{t:"d-transform",i:"⇒",v:"new local context: inputNumber=3"},{t:"log-green",i:"f",v:"local variable environment created"}],
    [{t:"d-transform",i:"⇒",v:"result = 3 * 2 = 6"},{t:"log-green",i:"f",v:"computed in local memory"}],
    [{t:"d-output",i:"←",v:"return 6"},{t:"log-orange",i:">",v:"local context destroyed after return"}],
    [{t:"d-output",i:"←",v:"output=6, newOutput=20"},{t:"log-purple",i:"H",v:"GEC updated with both results"}],
  ],
  mem:[
    {g:[{k:"num",v:"3",s:"mv-new"}],l:[],c:[]},
    {g:[{k:"num",v:"3"},{k:"multiplyBy2",v:"fn ref",s:"mv-new"}],l:[],c:[]},
    {g:[{k:"num",v:"3"},{k:"multiplyBy2",v:"fn ref"}],l:[{k:"inputNumber",v:"3",s:"mv-new"}],c:[]},
    {g:[{k:"num",v:"3"},{k:"multiplyBy2",v:"fn ref"}],l:[{k:"inputNumber",v:"3"},{k:"result",v:"6",s:"mv-new"}],c:[]},
    {g:[{k:"num",v:"3"},{k:"multiplyBy2",v:"fn ref"}],l:[{k:"return",v:"6",s:"mv-changed"}],c:[]},
    {g:[{k:"num",v:"3"},{k:"multiplyBy2",v:"fn ref"},{k:"output",v:"6",s:"mv-new"},{k:"newOutput",v:"20",s:"mv-new"}],l:[],c:[]},
  ],
},{
  name:"Parameters vs arguments",
  desc:"<em>Parameters</em> are the names in the function definition. <em>Arguments</em> are the actual values passed when calling. They're different words for different moments in time.",
  code:`<span class="cm">// 'name' and 'greeting' are PARAMETERS</span>
<span class="kw">function</span> <span id="gc0">greet</span>(name, greeting) {
  <span class="kw">return</span> greeting + <span class="str">" "</span> + name;
}

<span class="cm">// "Alice" and "Hello" are ARGUMENTS</span>
<span id="gc1">greet</span>(<span class="str">"Alice"</span>, <span class="str">"Hello"</span>);
<span id="gc2">greet</span>(<span class="str">"Bob"</span>,   <span class="str">"Hey"</span>);`,
  steps:["greet defined — 2 parameters: name, greeting","greet('Alice','Hello') — arguments passed","name='Alice', greeting='Hello' in local context","return 'Hello Alice'","greet('Bob','Hey') — fresh context","return 'Hey Bob'"],
  hl:["gc0","gc1","gc1","gc1","gc2","gc2"],
  frames:[
    [{l:"global()",t:"f-global"}],
    [{l:"global()",t:"f-global"},{l:"greet('Alice','Hello')",t:"f-hof"}],
    [{l:"global()",t:"f-global"},{l:"greet('Alice','Hello')",t:"f-active"}],
    [{l:"global()",t:"f-global"},{l:"greet('Alice','Hello')",t:"f-cb"}],
    [{l:"global()",t:"f-global"},{l:"greet('Bob','Hey')",t:"f-hof"}],
    [{l:"global()",t:"f-global"},{l:"greet('Bob','Hey')",t:"f-cb"}],

  name:"Hoisting — memory phase vs execution phase",

  code:`<span class="cm">// Memory phase: sayHello stored fully</span>
<span id="gc0">sayHello()</span>; <span class="cm">// works! before definition line</span>

<span class="kw">function</span> <span id="gc1">sayHello</span>() {

}

<span class="kw">var</span> <span id="gc3">x</span> = 5;

<span class="cm">// let/const: TDZ before this line</span>
<span class="kw">const</span> <span id="gc4">y</span> = 10;`,

{num:2,title:"The call stack",tag:"LIFO · push · pop · stack overflow",
concept:"The <strong>call stack</strong> is how JavaScript tracks which function is currently running and where to return when it finishes. It's a Last-In-First-Out (LIFO) structure: the most recently called function is always on top. When a function is called, a new frame is <em>pushed</em> onto the stack. When it returns, that frame is <em>popped</em> off and execution resumes in the frame below. Only the top frame ever executes — everything else is paused. <strong>Stack overflow</strong> happens when too many frames pile up (infinite recursion) and memory runs out.",

],

{num:3,title:"Higher-order functions",tag:"generalised · callbacks · reusable",
concept:"A <strong>higher-order function (HOF)</strong> is any function that takes another function as an argument, returns a function, or both. This is what makes JS so expressive — instead of writing the same loop logic over and over with different bodies, you extract the repeated structure into a HOF and pass in only what changes. <code>map</code>, <code>filter</code>, and <code>reduce</code> are classic HOFs. The function you pass in is called a <strong>callback</strong> — it gets called by the HOF at the right moment.",

{num:5,title:"Arrow functions",tag:"syntax · lexical this · concise",
concept:"Arrow functions are a concise syntax for writing functions: <code>(x) => x * 2</code> instead of <code>function(x){ return x * 2; }</code>. They have a key difference from regular functions: they have <strong>no own <code>this</code></strong> — they inherit <code>this</code> from the surrounding lexical scope. This makes them ideal for callbacks inside methods, where you want <code>this</code> to refer to the enclosing object. They also have implicit returns when written without curly braces.",

{num:6,title:"State",tag:"live data · local vs global · persistence",
concept:"<strong>State</strong> is data that changes over time — the live values your program tracks as it runs. Local state (variables inside a function) dies when the function returns. Global state persists but is fragile — any code can change it, making bugs hard to trace. The tension between 'I need this to persist' and 'I need this to be safe' is exactly what closures solve. Understanding state helps you understand <em>why</em> closures exist.",
callout:null,refs:[],
memPanelTitle:"State tracking",
legend:[{color:"var(--purple)",label:"Local state (dies)"},{color:"var(--green)",label:"Global state (persists)"},{color:"var(--orange)",label:"State mutation"}],

  name:"Local vs global state",
  desc:"Local variables are born when a function runs and die when it returns. Global variables persist across calls — but anything can change them.",
  code:`<span class="cm">// Global state — persists, but fragile</span>
<span class="kw">let</span> <span id="gc0">globalCount</span> = 0;

<span class="kw">function</span> <span id="gc1">incrementGlobal</span>() {
  globalCount++;
  <span class="kw">return</span> globalCount;
}

<span class="cm">// Local state — safe, but dies each call</span>
<span class="kw">function</span> <span id="gc2">incrementLocal</span>() {
  <span class="kw">let</span> <span id="gc3">count</span> = 0; <span class="cm">// resets every call</span>
  count++;
  <span class="kw">return</span> count;   <span class="cm">// always returns 1</span>
}

<span id="gc4">incrementGlobal()</span>; <span class="cm">// 1</span>
<span id="gc5">incrementGlobal()</span>; <span class="cm">// 2</span>
incrementLocal();    <span class="cm">// 1 (always 1)</span>`,

{num:7,title:"Closures",tag:"backpack · persistent scope · COVE",
concept:"A <strong>closure</strong> is a function that <em>remembers</em> the variables from its birth environment even after that environment has finished executing. When an inner function is defined inside an outer function, it gets a hidden 'backpack' attached to it — a reference to all the variables in its surrounding scope at the moment it was created. This backpack travels with the function wherever it goes. The technical term: a function object plus its surrounding variable environment. Closures are the mechanism behind stateful functions, the module pattern, memoization, and much more.",
callout:{type:"callout-purple",text:"Every function in JavaScript is a closure — it always remembers the scope in which it was created. Most of the time this doesn't matter because the scope is the global one. It matters when a function is defined inside another function and returned."},
refs:[],
memPanelTitle:"Closure / backpack",
legend:[{color:"var(--purple)",label:"Outer function"},{color:"var(--green)",label:"Inner function"},{color:"var(--orange)",label:"Closed-over variable"}],
examples:[{
  name:"The counter — classic closure",
  desc:"The inner function closes over <code>count</code> from the outer function's scope. When the outer function returns, <code>count</code> should die — but the inner function's backpack keeps it alive.",
  code:`<span class="kw">function</span> <span id="gc0">makeCounter</span>() {
  <span class="kw">let</span> <span id="gc1">count</span> = 0; <span class="cm">// lives in backpack</span>

  <span class="kw">return</span> <span id="gc2"><span class="kw">function</span>() {
    count++;
    <span class="kw">return</span> count;
  }</span>;
}

<span class="kw">const</span> <span id="gc3">counter</span> = makeCounter();
<span class="cm">// makeCounter's context is gone —</span>
<span class="cm">// but count lives on in counter's backpack</span>

<span id="gc4">counter()</span>; <span class="cm">// 1</span>
<span id="gc5">counter()</span>; <span class="cm">// 2</span>
counter();  <span class="cm">// 3</span>`,

{num:8,title:"Memoization",tag:"cache · performance · closures applied",
concept:"<strong>Memoization</strong> is an optimisation technique: cache the results of expensive function calls so that if the same input is seen again, the cached result is returned immediately without recomputing. It's a direct application of closures — the cache lives in the closure's backpack, persisting between calls but hidden from the outside world. Pure functions (same input always → same output, no side effects) are ideal candidates for memoization.",
callout:null,refs:[],
memPanelTitle:"Cache (closure)",
legend:[{color:"var(--purple)",label:"Cache miss — compute"},{color:"var(--green)",label:"Cache hit — return"},{color:"var(--orange)",label:"Slow function"}],

  code:`<span class="kw">function</span> <span id="gc0">memoize</span>(fn) {
  <span class="kw">const</span> <span id="gc1">cache</span> = {}; <span class="cm">// lives in backpack</span>

  <span class="kw">return</span> <span kw="kw">function</span>(<span id="gc2">n</span>) {

  };
}

concept:"Helper functions are small, composable utility decorators — functions that wrap other functions to add a single constraint. <code>once</code> ensures a function runs exactly once, no matter how many times it's called. <code>partial</code> pre-fills arguments to create specialised functions. These patterns appear throughout real codebases, frameworks, and interviews. They're small enough to understand completely and powerful enough to be genuinely useful.",

{num:13,title:"Async JavaScript",tag:"event loop · setTimeout · fetch · microtask",
concept:"JavaScript is single-threaded — it can only do one thing at a time. Async JS is the answer to 'how do we handle slow operations (network, timers) without blocking?' The answer: hand the slow work to the browser's Web APIs, keep running JS synchronously, and pick up the result via a callback when the stack is clear. The <strong>event loop</strong> orchestrates this: it checks the call stack, and when it's empty, it pulls the next task from the queue. Microtasks (Promises) drain completely before macrotasks (setTimeout).",

{num:15,title:"The three queues",tag:"Priority 1·2·3 · microtask · macrotask",
concept:"Your diagram explicitly assigned priorities. <strong>Priority 1: Call stack</strong> — LIFO, synchronous. JS never interrupts a running call stack. <strong>Priority 2: Microtask queue</strong> — Promises and async/await. Drains <em>completely</em> after each call stack task before anything else runs. <strong>Priority 3: Callback queue (macrotask)</strong> — FIFO, holds setTimeout, setInterval, DOM events. Only runs when <em>both</em> the call stack and microtask queue are empty. The event loop orchestrates all three.",

{num:17,title:"Async/Await",tag:"modern syntax · promises under the hood · try/catch",
concept:"Your notes starred this and noted: 'modern syntax, cleaner way, promises under the hood.' Every <code>async</code> function automatically wraps its return value in a resolved Promise — <code>async function(){ return 'Hello' }</code> is identical to <code>async function(){ return Promise.resolve('Hello') }</code>. <code>await</code> pauses the <em>function</em> (not the thread) until the Promise resolves. The function's continuation is scheduled as a microtask. Use <code>try/catch</code> instead of <code>.catch()</code> — a rejected Promise inside an <code>await</code> throws.",
callout:null,refs:[],

  name:"Sequential vs parallel awaits — time cost",

{num:18,title:"OOP & encapsulation",tag:"dot notation · data+functions · private vs public",
concept:"<strong>Object-Oriented Programming</strong> in JS bundles data and the functions that operate on it together — encapsulation. Dot notation (<code>user.name</code>, <code>user.increment()</code>) is how you interact with that bundle. Encapsulation also gives you control over which properties are public (accessible to anyone) and which are private (only accessible inside the object's own methods). The modern approach uses <code>class</code> with <code>#</code>-prefixed fields for true private properties.",

memPanelTitle:"Object memory",
legend:[{color:"var(--purple)",label:"Object"},{color:"var(--green)",label:"Public property"},{color:"var(--orange)",label:"Private property"}],
examples:[{

}

{num:19,title:"__proto__ & prototype chain",tag:"hidden property · lookup · delegation",
concept:"Every object has a hidden <code>__proto__</code> property pointing to another object — its prototype. When you access a property and it's not found on the object itself, JS follows the <code>__proto__</code> link to the next object. If still not found, it follows that object's <code>__proto__</code>, and so on until it reaches <code>null</code>. This is <strong>delegation</strong>: methods live once on the prototype, shared by all instances. The full chain ends at <code>Object.prototype → null</code>.",
callout:null,refs:[],
memPanelTitle:"Prototype chain",
legend:[{color:"var(--purple)",label:"Own property"},{color:"var(--green)",label:"Found on prototype"},{color:"var(--orange)",label:"Chain hop"}],
examples:[{
  name:"Property lookup — following __proto__",
  desc:"JS first looks on the object itself. If not found, walks up <code>__proto__</code> links. Methods live once on the prototype, shared by all.",
  code:`<span class="kw">const</span> <span id="gc0">animal</span> = {
  breathe() { console.log(<span class="str">"breathing"</span>); }
};

<span class="kw">const</span> <span id="gc1">dog</span> = Object.create(animal);
dog.name = <span class="str">"Rex"</span>;
dog.bark = () => console.log(<span class="str">"woof"</span>);

<span id="gc2">dog.name</span>;      <span class="cm">// "Rex" — own property</span>
<span id="gc3">dog.bark()</span>;    <span class="cm">// "woof" — own method</span>
<span id="gc4">dog.breathe()</span>; <span class="cm">// "breathing" ← via __proto__</span>
<span id="gc5">dog.fly</span>;        <span class="cm">// undefined — not found</span>`,
  steps:["animal with breathe method","dog = Object.create(animal) — __proto__ set","dog.name, dog.bark — own properties","dog.name — found on dog directly","dog.breathe() — NOT on dog, follow __proto__","dog.fly — chain exhausted → undefined"],
  hl:["gc0","gc1","gc1","gc2","gc4","gc5"],
  frames:[

  name:"hasOwnProperty — own vs inherited",
  desc:"<code>hasOwnProperty('key')</code> returns <code>true</code> only if the property lives directly on the object — not on any prototype. The <code>in</code> operator checks the <em>entire</em> chain. Both tools help you distinguish own data from inherited behaviour.",

{num:21,title:"`this` binding",tag:"call-site · four rules · implicit · explicit",

{num:22,title:"Function duality",tag:"object + function · .call · .apply · .bind",
concept:"Your diagram: <strong>JS function — duality — Object | Function. Object → can have properties → which can be objects themselves.</strong> Every function is simultaneously callable (<code>fn()</code>) AND an object with properties (<code>fn.name</code>, <code>fn.length</code>, <code>fn.prototype</code>, <code>fn.call</code>). This is why <code>.call()</code>, <code>.apply()</code>, and <code>.bind()</code> are just methods on the function object — found via the prototype chain. This duality is the foundation of callbacks, HOFs, decorators, and the prototype system.",

{num:23,title:"The `new` keyword",tag:"four steps · auto object creation · returns",

{num:25,title:"Generators",tag:"function* · yield · .next() · controlled iteration",
concept:"A <strong>generator</strong> is a function that can pause its own execution, save state, return a value, and resume exactly where it left off. Declare with <code>function*</code>. Calling it returns a <strong>generator object</strong> — the body doesn't run yet. Call <code>.next()</code> to run until the next <code>yield</code>, which pauses it. <code>yield</code> is not <code>return</code>: return ends the function permanently; yield pauses it while saving all local state. <code>.next(value)</code> sends a value <em>into</em> the generator — your notes showed this as <code>genX1.send('Hello')</code>.",
callout:null,
refs:[
  {lbl:"return",cls:"",title:"Ends permanently",sub:"state destroyed"},
  {lbl:"yield",cls:"",title:"Pauses + saves",sub:"resumes on .next()"},
],

{num:26,title:"Functional JS & composition",tag:"map · reduce · pipe · compose",

  name:"Manual curry — implementing curry(fn)",
  desc:"You can write a <code>curry</code> helper that wraps <em>any</em> function. It checks if enough arguments have been collected; if not, it returns another function. When all args arrive, it calls the original. This is 'lego blocking' of arguments made automatic.",
  code:`<span class="kw">function</span> <span id="gc0">curry</span>(fn) {
  <span class="kw">return function</span> <span id="gc1">curried</span>(...args) {
    <span class="kw">if</span> (args.length >= fn.length)
      <span class="kw">return</span> <span id="gc2">fn(...args)</span>;
    <span class="kw">return</span> (...more) => curried(...args, ...more);
  };
}

{num:28,title:"The module pattern",tag:"IIFE · revealing module · ES6 import/export",
concept:"The <strong>module pattern</strong> solves a fundamental problem: keep code organised, prevent name collisions, and control what is public vs private. It's a direct application of everything you've learned — a closure (Ch.7) that encapsulates private state (Ch.18) and exposes a controlled public interface. An IIFE runs once, creates private scope, and returns the public API. Modern ES6 <code>import</code>/<code>export</code> does the same at the file level — every JS file is its own module scope.",

{num:29,title:"Type coercion",tag:"implicit · == vs === · truthy/falsy · NaN",
concept:"JavaScript automatically converts values between types when operators or comparisons need it — <strong>implicit type coercion</strong>. The <code>+</code> operator prefers strings (concatenates if either side is a string). Arithmetic operators (<code>-</code>, <code>*</code>, <code>/</code>) prefer numbers. <code>==</code> (loose equality) coerces before comparing; <code>===</code> (strict) never does. The 6 falsy values: <code>false, 0, '', null, undefined, NaN</code>. Everything else is truthy — including <code>'0'</code> and <code>[]</code>.",

{num:30,title:"Metaprogramming",tag:"Proxy · Reflect · Symbol · intercept operations",
concept:"<strong>Metaprogramming</strong> is writing code that operates on other code — intercepting, redefining, or inspecting JS operations at the language level. <strong>Symbol</strong> creates unique, non-string property keys and hooks into built-in protocols (like making an object iterable). <strong>Proxy</strong> wraps any object and intercepts fundamental operations — reads, writes, deletions — via handler traps. <strong>Reflect</strong> provides the default implementations of those same operations, so you can intercept, do custom logic, then forward to the default. Vue 3's reactivity system is built on Proxy + Reflect.",

{num:31,title:"Web Workers",tag:"dedicated worker · postMessage · onmessage · off main thread",
concept:"JavaScript is single-threaded — but the <strong>browser</strong> is not. Web Workers let you run a script in a completely separate OS thread, giving you true parallelism without blocking the UI. The worker and main thread can't share memory directly (except via <code>SharedArrayBuffer</code>) — they communicate exclusively through <code>postMessage</code> / <code>onmessage</code>, which <em>clone</em> the data. Workers have no access to <code>window</code>, <code>document</code>, or the DOM — they're fully isolated. Use them for CPU-heavy tasks: image processing, encryption, large data parsing.",
callout:{type:"callout-purple",text:"Workers communicate by copying data (structured clone), not sharing it. This prevents race conditions by design — the two threads never touch the same object."},
refs:[
  {lbl:"Main thread",cls:"",title:"UI + event loop",sub:"runs JS, handles DOM, stays responsive"},
  {lbl:"Worker thread",cls:"",title:"Isolated JS scope",sub:"no window · no DOM · CPU work lives here"},
  {lbl:"postMessage",cls:"",title:"Send data",sub:"clones via structured clone algorithm"},
  {lbl:"onmessage",cls:"",title:"Receive data",sub:"fires on the receiving thread"},
],

// ── ENGINE ──────────────────────────────────────────
let curCh=0,curEx=0,curStep=-1,autoTimer=null;
const ch=()=>CHAPTERS[curCh];
const ex=()=>ch().examples[curEx];

function buildNav(){
  // Tab bar
  document.getElementById('ch-tabs').innerHTML=CHAPTERS.map((c,i)=>
    `<div class="ch-tab${i===curCh?' active':' done'}" onclick="loadChapter(${i})">Ch.${c.num} ${c.title}</div>`
  ).join('');
  // Sidebar
  document.getElementById('side-list').innerHTML=CHAPTERS.map((c,i)=>
    `<div class="sideitem${i===curCh?' active':' done'}" onclick="loadChapter(${i});closeSidebar()">
      <div class="si-num">${c.num}</div>
      <div class="si-info"><div class="si-title">${c.title}</div><div class="si-tag">${c.tag}</div></div>
    </div>`
  ).join('');
  // Scroll active tab into view
  setTimeout(()=>{
    const at=document.querySelector('.ch-tab.active');
    if(at)at.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
    const as=document.querySelector('.sideitem.active');
    if(as)as.scrollIntoView({block:'nearest'});
  },50);
}

function loadChapter(i){
  stopAuto();curCh=i;curEx=0;curStep=-1;
  buildNav();
  const c=ch();
  document.getElementById('hdr-badge').textContent='Ch. '+c.num;
  document.getElementById('hdr-title').textContent=c.title;
  document.getElementById('concept-text').innerHTML=c.concept;
  document.getElementById('mem-panel-title').textContent=c.memPanelTitle||'Memory';
  // Callout
  const ca=document.getElementById('callout-area');
  ca.innerHTML=c.callout?`<div class="callout ${c.callout.type}">${c.callout.text}</div>`:'';
  // Refs
  const ra=document.getElementById('ref-area');
  ra.innerHTML=c.refs&&c.refs.length?`<div class="ref-row">${c.refs.map(r=>`<div class="ref-card"><div class="ref-lbl">${r.lbl}</div><div class="ref-title">${r.title}</div><div class="ref-sub">${r.sub}</div></div>`).join('')}</div>`:'';
  // Legend
  document.getElementById('legend').innerHTML=(c.legend||[]).map(l=>`<div class="leg-item"><div class="leg-dot" style="background:${l.color}"></div>${l.label}</div>`).join('');
  document.getElementById('card-code').innerHTML=ex().code;
  clearCards();updateExHeader();buildDots();
  document.getElementById('main-body').scrollTop=0;
}

function updateExHeader(){
  const e=ex();
  document.getElementById('ex-name').textContent=e.name;
  document.getElementById('ex-ctr').textContent=` ${curEx+1} of ${ch().examples.length}`;
  document.getElementById('ex-desc').innerHTML=e.desc;
  document.getElementById('ex-prev').disabled=curEx===0;
  document.getElementById('ex-next').disabled=curEx===ch().examples.length-1;
}

function switchEx(dir){
  const n=curEx+dir;
  if(n<0||n>=ch().examples.length)return;
  stopAuto();curEx=n;curStep=-1;
  document.getElementById('card-code').innerHTML=ex().code;
  clearCards();updateExHeader();buildDots();
}

function buildDots(){
  document.getElementById('sdots').innerHTML=ex().steps.map((_,i)=>`<div class="sdot" id="sd${i}"></div>`).join('');
  updateUI();
}

function updateUI(){
  const total=ex().steps.length,s=curStep;
  ex().steps.forEach((_,i)=>{
    const d=document.getElementById('sd'+i);
    if(d)d.className='sdot'+(i<s?' done':i===s?' cur':'');
  });
  document.getElementById('sctr').textContent=s<0?`0/${total}`:`${s+1}/${total}`;
  document.getElementById('sdesc').textContent=s<0?'Press Next':(ex().steps[s]||'');
  document.getElementById('btn-prev').disabled=s<=0;
  document.getElementById('btn-next').disabled=s>=total-1;
  if(s>=total-1&&autoTimer)stopAuto();
}

function renderStep(s){
  const e=ex();
  document.querySelectorAll('[id^="gc"]').forEach(el=>el.classList.remove('hl'));
  const hid=e.hl[s];if(hid){const el=document.getElementById(hid);if(el)el.classList.add('hl');}
  document.getElementById('card-stack').innerHTML=(e.frames[s]||[]).map(f=>`<div class="frame ${f.t} show">${f.l}</div>`).join('');
  renderFlow(e.flow[s]||[]);
  renderMem(e.mem[s]||{g:[],l:[],c:[]});
  updateUI();
}

function renderFlow(items){
  const all=items.filter(x=>x.t!=='log-item'&&!x.t.startsWith('log-')&&x.t!=='log-special');
  const logs=items.filter(x=>x.t==='log-item'||x.t.startsWith('log-')||x.t==='log-special');
  let h='';
  if(all.length){
    h+=`<div class="df-lbl">Data</div>`;
    all.forEach(d=>{
      const cls=d.t==='d-special'?'d-special':d.t==='d-transform'?'d-transform':d.t==='d-output'?'d-output':'d-input';
      const icon=d.t==='d-special'?'!':d.t==='d-transform'?'⇒':d.t==='d-output'?'←':'→';
      h+=`<div class="ditem ${cls} show"><div class="dicon">${icon}</div><div class="dtxt">${d.v}</div></div>`;
    });
  }
  if(logs.length){
    if(all.length)h+=`<div class="df-div"></div>`;
    h+=`<div class="df-lbl">Console</div>`;
    logs.forEach(l=>{
      const cls=l.t==='log-special'?'d-special log-item':l.t||'log-item log-orange';
      const icon=l.i||'>';
      h+=`<div class="ditem log-item ${cls} show"><div class="dicon">${icon}</div><div class="dtxt">${l.v}</div></div>`;
    });
  }
  document.getElementById('card-flow').innerHTML=h;
}

function renderMem(mem){
  const secs=[
    {k:'g',l:'Global',cls:'mt-global'},
    {k:'l',l:'Local frame',cls:'mt-local'},
    {k:'c',l:'Closure / backpack',cls:'mt-closure'},
  ];
  document.getElementById('card-mem').innerHTML=secs.map(sec=>{
    const rows=mem[sec.k]||[];
    return `<div class="memsec">
      <span class="memtitle ${sec.cls}">${sec.l}</span>
      <div class="memrows">${rows.length
        ?rows.map(r=>`<div class="memrow show"><span class="memkey">${r.k}</span><span class="memval ${r.s||''}">${r.v}</span></div>`).join('')
        :'<div class="mem-empty">— empty —</div>'
      }</div>
    </div>`;
  }).join('');
}

function clearCards(){
  ['card-stack','card-flow','card-mem'].forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML='';});
  document.querySelectorAll('[id^="gc"]').forEach(el=>el.classList.remove('hl'));
}

function nav(dir){
  const total=ex().steps.length;
  if(dir===1&&curStep<total-1){curStep++;renderStep(curStep);}
  else if(dir===-1){
    if(curStep>0){curStep--;renderStep(curStep);}
    else if(curStep===0){curStep=-1;clearCards();updateUI();}
  }
}

function stopAuto(){clearInterval(autoTimer);autoTimer=null;const b=document.getElementById('btn-auto');if(b)b.textContent='Auto-play';}
function autoPlay(){
  if(autoTimer){stopAuto();return;}
  if(curStep>=ex().steps.length-1){curStep=-1;clearCards();buildDots();}
  document.getElementById('btn-auto').textContent='Stop';
  autoTimer=setInterval(()=>{
    if(curStep>=ex().steps.length-1){stopAuto();return;}
    curStep++;renderStep(curStep);
  },850);
}

function toggleSidebar(){
  const s=document.getElementById('sidebar');
  s.classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nav(1);}
  if(e.key==='ArrowLeft'){e.preventDefault();nav(-1);}
  if(e.key==='ArrowUp'){e.preventDefault();switchEx(-1);}
  if(e.key==='ArrowDown'){e.preventDefault();switchEx(1);}
  if(e.key==='1'&&e.metaKey===false)loadChapter(Math.max(0,curCh-1));
  if(e.key==='2'&&e.metaKey===false)loadChapter(Math.min(CHAPTERS.length-1,curCh+1));
});

// Init
loadChapter(0);
</script>
